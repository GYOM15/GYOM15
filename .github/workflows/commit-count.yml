name: Total commit count

# Compte les commits sur toutes mes adresses email (repos privés inclus)
# via l'API Search, et génère une carte SVG (style Tokyo Night) + un JSON
# shields dans la branche badges, que le README affiche.

on:
  schedule:
    - cron: "0 2 * * *"   # tous les jours à 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout badges branch
        uses: actions/checkout@v4
        with:
          ref: badges

      - name: Compter les commits (toutes adresses, privés inclus)
        env:
          GH_TOKEN: ${{ secrets.PAT_1 }}
        run: |
          set -e
          emails="calebkoffi21@gmail.com millimounou.guy_olivier_yanouba@courrier.uqam.ca millimouno.guy_olivier_yanouba@courrier.uqam.ca 116668599+GYOM15@users.noreply.github.com"
          total=0
          for e in $emails; do
            n=$(gh api -X GET search/commits \
                  -H "Accept: application/vnd.github.cloak-preview+json" \
                  -f q="author-email:$e" --jq '.total_count' || echo 0)
            n=${n:-0}
            echo "$e -> $n"
            total=$((total + n))
            sleep 3
          done
          echo "TOTAL=$total"
          if [ "$total" -lt 1 ]; then
            echo "::warning::Total = 0 — secret PAT_1 manquant/invalide. Carte non mise a jour."
            exit 1
          fi
          fmt=$(printf "%s" "$total" | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta')

          # JSON shields (au cas ou)
          printf '{"schemaVersion":1,"label":"Total Commits","message":"%s","color":"blueviolet","namedLogo":"git","logoColor":"white"}\n' "$total" > commits.json

          # Carte SVG (theme Tokyo Night) — __N__ remplace par le total formate
          cat > tmpl.svg <<'SVG'
          <svg width="495" height="115" viewBox="0 0 495 115" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
            <title id="title">Total Commits: __N__</title>
            <style>
              .header { font: 600 18px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #70a5fd }
              .stat   { font: 700 44px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #38bdae }
              .sub    { font: 400 13px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif; fill: #a9b1d6 }
            </style>
            <rect x="0.5" y="0.5" rx="4.5" height="114" width="494" fill="#1a1b27" stroke="#e4e2e2"/>
            <path transform="translate(26,18) scale(1.1)" fill="#bf91f3" d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
            <text x="52" y="33" class="header">Total Commits</text>
            <text x="26" y="90" class="stat">__N__</text>
            <text x="185" y="74" class="sub">across all repositories</text>
            <text x="185" y="92" class="sub">private repos included</text>
          </svg>
          SVG
          sed "s/__N__/$fmt/g" tmpl.svg > commits.svg
          rm -f tmpl.svg
          echo "--- commits.svg ---"; cat commits.svg

      - name: Publier si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commits.json commits.svg
          git commit -m "chore: update total commit count" || { echo "aucun changement"; exit 0; }
          git push origin badges
